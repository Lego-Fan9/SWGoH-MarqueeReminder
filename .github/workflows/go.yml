# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '.github/workflows/**'
      - 'SpriteServer/**'
      - 'Test/**'
      - 'TODO'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.4'
        cache-dependency-path: |
          src/go.sum

    - name: Build and test UpdateNotifier
      run: |
        export CGO_ENABLED=0
        cd src
        go build -v -ldflags="-s -w" -tags netgo
        export TESTING=1 
        go test ./... -v
